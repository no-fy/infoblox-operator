---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: hostrecords.dns.hefr.ch
spec:
  group: dns.hefr.ch
  names:
    kind: HostRecord
    listKind: HostRecordList
    plural: hostrecords
    singular: hostrecord
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: HostRecord is the Schema for the hostrecords API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of HostRecord
            properties:
              credentialsSecret:
                description: |-
                  CredentialsSecret references a Secret containing credentials to authenticate to Infoblox.
                  Required keys: "username" and "password".
                  If namespace is omitted, defaults to the namespace of the HostRecord resource.
                properties:
                  name:
                    description: Name of the Secret.
                    minLength: 1
                    type: string
                  namespace:
                    description: Namespace of the Secret. If omitted, defaults to
                      the resource namespace.
                    type: string
                required:
                - name
                type: object
              dnsView:
                default: default
                description: DNSView is the DNS view in Infoblox (defaults to "default").
                type: string
              extAttrs:
                additionalProperties:
                  type: string
                description: ExtAttrs are Infoblox Extensible Attributes to set on
                  the host record.
                type: object
              fqdn:
                description: FQDN is the DNS name of the host record to ensure exists
                  in Infoblox.
                minLength: 1
                type: string
              insecureTLS:
                description: InsecureTLS skips TLS verification when connecting to
                  Infoblox.
                type: boolean
              ip:
                description: IP is the IPv4 address to assign. If omitted, an IP will
                  be allocated from NetworkCIDR.
                type: string
              networkCIDR:
                description: |-
                  NetworkCIDR is the network from which to allocate the next available IP if IP is not provided.
                  Example: 10.0.0.0/24
                type: string
              networkView:
                default: default
                description: NetworkView is the network view for IP allocation (defaults
                  to "default").
                type: string
              ttl:
                description: TTL is the desired TTL for the host record.
                minimum: 0
                type: integer
              wapiEndpoint:
                description: |-
                  WAPIEndpoint is the fully-qualified base URL to the Infoblox WAPI endpoint, including version.
                  Example: https://infoblox.example.com/wapi/v2.12
                pattern: ^https?://.+/wapi/v[0-9]+\.[0-9]+$
